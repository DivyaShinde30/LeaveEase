<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Leaves - LeaveApp</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/leave-history.css">
  <link rel="stylesheet" href="css/profile-dropdown.css">
</head>
<body>
  <header id="navbar" class="navbar"></header>

  <main class="main">
    <div class="page-header">
      <h1>My Leave History</h1>
      <p>View all your submitted leave applications</p>
    </div>

    <div class="filters">
      <select id="filterStatus" class="filter-select">
        <option value="all">All Status</option>
        <option value="pending">Pending</option>
        <option value="approved">Approved</option>
        <option value="rejected">Rejected</option>
      </select>
      <a href="apply-leave.html" class="btn btn--primary btn--sm">+ Apply Leave</a>
    </div>

    <div id="leavesTable" class="table-wrapper"></div>
  </main>

  <script src="js/app.js"></script>
  <script src="js/profile-dropdown.js"></script>
  <script src="js/leave-history.js"></script>
</body>
</html>
