<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - LeaveEase</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <!-- Admin Navbar -->
  <nav class="navbar admin-navbar">
    <a class="navbar__brand" href="index.html"><span>&#127891;</span> LeaveEase</a>
    <div class="admin-navbar__buttons">
      <a href="admin_login.html" class="btn btn--primary admin-nav-btn">Admin Login</a>
      <a href="admin_register.html" class="btn btn--outline admin-nav-btn">Admin Register</a>
    </div>
  </nav>

  <div class="login-page has-admin-navbar">
    <div class="login-card">
      <div class="login-card__header">
        <span class="login-card__icon">&#128272;</span>
        <h1>Admin Login</h1>
        <p>Sign in to the admin panel</p>
      </div>

      <div id="alert" class="alert"></div>

      <form id="adminLoginForm">
        <div class="form-group">
          <label for="adminUsername">Admin Username</label>
          <input type="text" id="adminUsername" placeholder="Enter admin username" required>
        </div>
        <div class="form-group">
          <label for="adminPassword">Password</label>
          <input type="password" id="adminPassword" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn--primary btn--full">Login</button>
      </form>

      <p style="text-align: center; margin-top: 1rem; font-size: 0.9rem; color: var(--gray-500);">
        Don't have an admin account?
        <a href="admin_register.html" style="color: var(--primary); font-weight: 500;">Register here</a>
      </p>
      <p style="text-align: center; margin-top: 0.5rem;">
        <a href="index.html" style="color: var(--gray-500); font-size: 0.85rem;">&larr; Back to Student/Staff Login</a>
      </p>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    document.getElementById('adminLoginForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      const username = document.getElementById('adminUsername').value.trim();
      const password = document.getElementById('adminPassword').value.trim();

      if (!username) {
        App.showAlert('alert', 'Please enter your admin username.', 'error');
        return;
      }
      if (!password) {
        App.showAlert('alert', 'Please enter your password.', 'error');
        return;
      }

      const result = await App.login(username, password, 'admin');
      if (result && result.success) {
        App.showAlert('alert', 'Login successful! Redirecting...', 'success');
        setTimeout(() => { window.location.href = 'admin_dashboard.html'; }, 800);
      } else {
        App.showAlert('alert', (result && result.error) ? result.error : 'Invalid admin credentials. Please try again.', 'error');
      }
    });
  </script>
</body>
</html>
