<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Register - LeaveEase</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <!-- Admin Navbar -->
  <nav class="navbar admin-navbar">
    <a class="navbar__brand" href="index.html"><span>&#127891;</span> LeaveEase</a>
    <div class="admin-navbar__buttons">
      <a href="admin_login.html" class="btn btn--outline admin-nav-btn">Admin Login</a>
      <a href="admin_register.html" class="btn btn--primary admin-nav-btn">Admin Register</a>
    </div>
  </nav>

  <div class="login-page has-admin-navbar">
    <div class="login-card">
      <div class="login-card__header">
        <span class="login-card__icon">&#128221;</span>
        <h1>Admin Register</h1>
        <p>Create a new admin account</p>
      </div>

      <div id="alert" class="alert"></div>

      <form id="adminRegisterForm">
        <div class="form-group">
          <label for="adminName">Admin Name</label>
          <input type="text" id="adminName" placeholder="Enter your full name" required>
        </div>
        <div class="form-group">
          <label for="adminUsername">Username</label>
          <input type="text" id="adminUsername" placeholder="Choose a username" required>
        </div>
        <div class="form-group">
          <label for="adminPassword">Password</label>
          <input type="password" id="adminPassword" placeholder="Create a password" required>
        </div>
        <div class="form-group">
          <label for="adminConfirmPassword">Confirm Password</label>
          <input type="password" id="adminConfirmPassword" placeholder="Confirm your password" required>
        </div>
        <button type="submit" class="btn btn--primary btn--full">Register</button>
      </form>

      <p style="text-align: center; margin-top: 1rem; font-size: 0.9rem; color: var(--gray-500);">
        Already have an admin account?
        <a href="admin_login.html" style="color: var(--primary); font-weight: 500;">Login here</a>
      </p>
      <p style="text-align: center; margin-top: 0.5rem;">
        <a href="index.html" style="color: var(--gray-500); font-size: 0.85rem;">&larr; Back to Student/Staff Login</a>
      </p>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    document.getElementById('adminRegisterForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      const name = document.getElementById('adminName').value.trim();
      const username = document.getElementById('adminUsername').value.trim();
      const password = document.getElementById('adminPassword').value.trim();
      const confirmPassword = document.getElementById('adminConfirmPassword').value.trim();

      if (!name) {
        App.showAlert('alert', 'Please enter your name.', 'error');
        return;
      }
      if (!username) {
        App.showAlert('alert', 'Please enter a username.', 'error');
        return;
      }
      if (!password) {
        App.showAlert('alert', 'Please enter a password.', 'error');
        return;
      }
      if (password.length < 4) {
        App.showAlert('alert', 'Password must be at least 4 characters.', 'error');
        return;
      }
      if (password !== confirmPassword) {
        App.showAlert('alert', 'Passwords do not match.', 'error');
        return;
      }

      const headers = { 'Content-Type': 'application/json' };
      const token = App.getToken && App.getToken();
      if (token) headers.Authorization = 'Bearer ' + token;

      const resp = await fetch('/api/auth/admin/register', {
        method: 'POST',
        headers,
        body: JSON.stringify({ name, username, password }),
      });
      const out = await resp.json().catch(() => ({}));
      if (!resp.ok) {
        const hint = resp.status === 401 && !token
          ? ' If an admin already exists, log in as admin first—then register additional admins.'
          : '';
        App.showAlert('alert', (out.error || 'Admin registration failed.') + hint, 'error');
        return;
      }

      App.showAlert('alert', 'Registration successful! Redirecting to login...', 'success');
      setTimeout(() => { window.location.href = 'admin_login.html'; }, 1200);
    });
  </script>
</body>
</html>
