<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apply Leave - LeaveApp</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/profile-dropdown.css">
</head>
<body>
  <header id="navbar" class="navbar"></header>

  <main class="main">
    <div class="page-header">
      <h1>Apply for Leave</h1>
      <p>Fill in the form below to submit a leave request</p>
    </div>

    <div id="alert" class="alert"></div>

    <section class="card">
      <form id="leaveForm" class="form">
        <div class="form-grid">
          <div class="form-group">
            <label for="studentName">Student Name</label>
            <input type="text" id="studentName" readonly>
          </div>

          <div class="form-group">
            <label for="enNo">EN No.</label>
            <input type="text" id="enNo" readonly>
          </div>

          <div class="form-group">
            <label for="rollNumber">Roll Number</label>
            <input type="text" id="rollNumber" readonly>
          </div>

          <div class="form-group">
            <label for="leaveType">Leave Type</label>
            <select id="leaveType" required>
              <option value="">Select Leave Type</option>
            </select>
          </div>

          <div class="form-group">
            <label for="startDate">From Date</label>
            <input type="date" id="startDate" required>
          </div>

              <div class="form-group">
                <label for="endDate">To Date</label>
                <input type="date" id="endDate" required>
              </div>

              <div class="form-group">
                <label for="reportingDate">Reporting Date</label>
                <input type="date" id="reportingDate" required>
              </div>

              <div class="form-group">
                <label>Number of Days</label>
            <div id="daysCount" class="days-box">0</div>
          </div>
        </div>

        <div class="form-group">
          <label for="reason">Reason for Leave</label>
          <textarea id="reason" placeholder="Briefly describe the reason for leave" required></textarea>
        </div>

        <div class="form-group">
          <label for="proof">Proof (Optional)</label>
          <input type="file" id="proof" accept=".jpg,.jpeg,.png,.gif,.pdf,.doc,.docx">
          <small class="form-hint">Accepted: Images, PDF, DOC (Max 2MB)</small>
        </div>

        <button type="submit" class="btn btn--primary">Submit Leave Request</button>
        <a href="leave-history.html" class="btn btn--outline">View My Leaves</a>
      </form>
      <!-- Status card shown after submission -->
      <div id="submissionStatus" class="submission-status" style="display:none;"></div>
    </section>
  </main>

  <script src="js/app.js"></script>
  <script src="js/profile-dropdown.js"></script>
  <script src="js/apply-leave.js"></script>
</body>
</html>
